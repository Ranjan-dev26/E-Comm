<div class="add-product">
    <h1>Add New Product</h1>
    <p class="message_p">{{addProductMessage}}</p>
    <form #addProduct="ngForm" (ngSubmit)="submit(addProduct.value)" class="common-form">
        <input class="form-input" type="text" name="name" placeholder="Enter Product Name" ngModel>
        <input class="form-input" type="number" name="price" placeholder="Enter Product Price" ngModel>
        <input class="form-input" type="text" name="color" placeholder="Enter Product Color" ngModel>
        <input class="form-input" type="text" name="category" placeholder="Enter Product Category" ngModel>
        <textarea class="form-input" name="description" placeholder="Enter Product Description" ngModel></textarea>
        <input class="form-input" type="text" name="image" placeholder="Enter Image URL" ngModel />
        <button class="form-button">Add Product</button>
    </form>
</div>
